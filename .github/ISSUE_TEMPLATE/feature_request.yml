name: Feature request
description: Suggest an improvement or new feature
title: "[feature] "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What is frustrating or missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - player
        - gestures
        - floating chat
        - stats
        - layout
        - branding / visuals
        - build / release
        - other
